# .github/workflows/selenium-ci.yml
# ============================================================
# GitHub Actions CI/CD – Selenium Test Suite (Lab 11 – Bài 2)
# Matrix Strategy: Chrome + Firefox chạy SONG SONG cùng lúc
# ============================================================

name: Selenium Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # Cho phép bấm nút chạy thủ công trên GitHub UI

jobs:
  run-tests:
    name: Run Tests – ${{ matrix.browser }}
    runs-on: ubuntu-latest

    # ── Matrix Strategy: tạo 2 job chạy SONG SONG ──────────
    strategy:
      matrix:
        browser: [chrome, firefox]   # Tạo 2 job chạy song song
      fail-fast: false               # Chrome fail KHÔNG dừng Firefox

    steps:
      # ── Bước 1: Checkout source code ──────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Bước 2: Cài Java 17 ───────────────────────────────
      - name: Cài Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven   # Cache ~/.m2 để lần sau build nhanh hơn

      # ── Bước 3: Cài Firefox (chỉ khi matrix.browser = firefox) ──
      - name: Cài Firefox
        if: matrix.browser == 'firefox'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y firefox
          firefox --version

      # ── Bước 4: Kiểm tra Chrome (chỉ khi matrix.browser = chrome) ──
      - name: Kiểm tra Chrome version
        if: matrix.browser == 'chrome'
        run: google-chrome --version

      # ── Bước 5: Chạy Selenium Tests ───────────────────────
      # -Dbrowser=${{ matrix.browser }} → dùng browser từ matrix
      # CI=true → BaseTest.java tự động bật headless mode
      - name: Chạy Selenium Tests (${{ matrix.browser }})
        run: |
          echo "=== Bắt đầu chạy test với browser: ${{ matrix.browser }} ==="
          START_TIME=$(date +%s)

          mvn clean test \
            -Dbrowser=${{ matrix.browser }} \
            -Denv=dev \
            -DsuiteXmlFile=testng-smoke.xml

          END_TIME=$(date +%s)
          echo "=== Thời gian chạy: $((END_TIME - START_TIME)) giây ==="
        env:
          CI: true                                          # Bật headless tự động
          # GitHub tự động che giá trị → log hiển thị *** thay vì giá trị thật
          APP_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}   # ← GitHub Secret
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}   # ← GitHub Secret

      # ── Bước 6: Lưu kết quả test (artifact riêng biệt/browser) ──
      - name: Lưu kết quả test – ${{ matrix.browser }}
        if: always()   # Luôn chạy dù test pass hay fail
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}   # Artifact riêng biệt mỗi browser
          path: |
            target/surefire-reports/
            target/screenshots/
          retention-days: 30
