# .github/workflows/selenium-ci.yml
# ============================================================
# GitHub Actions CI/CD – Selenium Test Suite (Lab 11 – Bài 1)
# ============================================================
# Trigger: mỗi lần push lên main/develop hoặc tạo Pull Request
# Job: chạy Selenium test headless trên ubuntu-latest
# ============================================================

name: Selenium Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # Cho phép bấm nút chạy thủ công trên GitHub UI

jobs:
  run-tests:
    name: Run Selenium Tests (Chrome Headless)
    runs-on: ubuntu-latest

    steps:
      # ── Bước 1: Checkout source code ──────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Bước 2: Cài Java 17 ───────────────────────────────
      - name: Cài Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven   # Cache ~/.m2 để lần sau build nhanh hơn

      # ── Bước 3: Kiểm tra Chrome có sẵn (ubuntu-latest) ───
      - name: Kiểm tra Chrome version
        run: google-chrome --version

      # ── Bước 4: Chạy Selenium Tests ───────────────────────
      # -Dbrowser=chrome   → dùng Chrome (headless tự động khi CI=true)
      # -Denv=dev          → môi trường dev (saucedemo.com)
      # -DsuiteXmlFile=... → chỉ định file testng nào cần chạy
      - name: Chạy Selenium Tests
        run: mvn clean test -Dbrowser=chrome -Denv=dev -DsuiteXmlFile=testng-smoke.xml
        working-directory: bai1
        env:
          CI: true                          # BaseTest.java đọc biến này để bật headless
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}   # Credential an toàn từ Secrets

      # ── Bước 5: Lưu kết quả test (luôn chạy dù test fail) ─
      - name: Lưu kết quả test
        if: always()   # Chạy dù test pass hay fail để không mất evidence
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            bai1/target/surefire-reports/
            bai1/target/screenshots/
          retention-days: 30
