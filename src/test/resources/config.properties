# ============================================================
# config.properties - Cấu hình môi trường cho framework test
# Đọc bởi ConfigReader.java
# ============================================================

# --- Môi trường mặc định ---
env=dev

# --- Base URL theo môi trường ---
url.dev=https://www.saucedemo.com/
url.staging=https://www.saucedemo.com/
url.prod=https://www.saucedemo.com/

# --- Timeout settings (giây) ---
timeout.explicit=15
timeout.pageload=30

# --- Credentials fallback (chỉ dùng khi chạy LOCAL)
# Khi chạy CI/CD: GitHub Secrets sẽ ghi đè qua APP_USERNAME / APP_PASSWORD
# TUYỆT ĐỐI KHÔNG commit credential thật vào đây nếu repo là public!
app.username=standard_user
app.password=secret_sauce
